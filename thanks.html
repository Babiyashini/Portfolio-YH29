<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent - Babiyashini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #F5F0EB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .thanks-container {
            background: #FFFFFF;
            padding: 4rem 3rem;
            border-radius: 24px;
            border: 3px solid #D98D8C;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(217, 141, 140, 0.2);
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .thanks-container .icon {
            font-size: 4.5rem;
            color: #00cc77;
            margin-bottom: 1.5rem;
            animation: bounce 1s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .thanks-container h1 {
            font-size: 2.5rem;
            color: #1A0F0D;
            margin-bottom: 0.5rem;
        }
        
        .thanks-container .subtitle {
            color: #3D201A;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .thanks-container .message {
            color: #3D201A;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        
        .thanks-container .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2.2rem;
            background: linear-gradient(135deg, #D98D8C, #C71F8A);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .thanks-container .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(217, 141, 140, 0.4);
        }
        
        .thanks-details {
            margin: 1.5rem 0;
            padding: 1rem;
            background: #F5F0EB;
            border-radius: 12px;
            text-align: left;
        }
        
        .thanks-details p {
            font-size: 0.9rem;
            color: #3D201A;
            font-weight: 500;
        }
        
        .thanks-details strong {
            color: #1A0F0D;
        }
        
        @media (max-width: 480px) {
            .thanks-container {
                padding: 2.5rem 1.5rem;
            }
            .thanks-container h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="thanks-container">
        <div class="icon">
            <i class="fas fa-check-circle"></i>
        </div>
        
        <h1>Message Sent! 🎉</h1>
        <p class="subtitle">Thank you for reaching out!</p>
        
        <div class="thanks-details">
            <p>📧 <strong>I'll get back to you</strong> within 24 hours.</p>
            <p style="margin-top: 0.5rem;">💬 Your message has been delivered to my inbox.</p>
        </div>
        
        <p class="message">
            I appreciate you taking the time to contact me. 
            I'll review your message and respond as soon as possible.
        </p>
        
        <a href="https://Babiyashini.github.io/Portfolio-YH29/" class="btn-primary">
            <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
    </div>
</body>
</html>
